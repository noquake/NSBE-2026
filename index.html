			const DAYS = [

			];

			const todayKey = new Date().toLocaleDateString("en-CA");
			const validDays = DAYS.map((d) => d.key);
			let activeDay = validDays.includes(todayKey) ? todayKey : "2026-03-18";
			let filter = "all";

			function isEnded(ev) {
				const now = new Date();
				const [time, period] = ev.end.split(" ");
				let [h, m] = time.split(":").map(Number);
				if (period === "PM" && h !== 12) h += 12;
				if (period === "AM" && h === 12) h = 0;
				const [year, month, day] = ev.date.split("-").map(Number);
				const endDate = new Date(year, month - 1, day, h, m);
				return now > endDate;
			}

			function parseTime(t) {
				const [time, period] = t.split(" ");
				let [h, m] = time.split(":").map(Number);
				if (period === "PM" && h !== 12) h += 12;
				if (period === "AM" && h === 12) h = 0;
				return h * 60 + m;
			}

			function hasConflict(ev, list) {
				const s1 = parseTime(ev.start),
					e1 = parseTime(ev.end);
				return list.some(
					(o) =>
						o !== ev &&
						o.date === ev.date &&
						parseTime(o.start) < e1 &&
						s1 < parseTime(o.end),
				);
			}

					{ key: "all", label: `All (${rc + yc})`, cls: "active-all" },
					{ key: "red", label: `Must Go (${rc})`, cls: "active-red" },
					{ key: "yellow", label: `Maybe (${yc})`, cls: "active-yellow" },
				];
				filtersEl.innerHTML = filterDefs
					.map(
						(f) =>
							`<button class="filter-btn ${filter === f.key ? f.cls : ""}" data-filter="${f.key}">${f.label}</button>`,
					)
					.join("");
				filtersEl.querySelectorAll(".filter-btn").forEach((btn) =>
					btn.addEventListener("click", () => {
						filter = btn.dataset.filter;
						render();
					}),
				);

				// Day label
				document.getElementById("dayLabel").textContent =
					DAYS.find((d) => d.key === activeDay)?.full.toUpperCase() || "";

				// Events
				const filtered = EVENTS.filter(
					(e) =>
						e.date === activeDay && (filter === "all" || e.priority === filter),
				).sort((a, b) => parseTime(a.start) - parseTime(b.start));
				const listEl = document.getElementById("eventsList");
				if (!filtered.length) {
					listEl.innerHTML = `<div class="empty">No events for this filter.</div>`;
				} else {
					listEl.innerHTML = filtered
						.map((ev) => {
							const isRed = ev.priority === "red";
							const conflict = hasConflict(ev, filtered);
							const ended = isEnded(ev);
							return `<div class="event-card ${isRed ? "red" : "yellow"}${ended ? " ended" : ""}">
        <div class="event-inner">
          <div style="flex:1">
            <div class="event-title">${ev.title}</div>
            <div class="event-time">${ev.start} – ${ev.end}</div>
          </div>
          <div class="event-meta">
            <span class="tag ${isRed ? "tag-red" : "tag-yellow"}">${isRed ? "GOING" : "MAYBE"}</span>
            ${conflict ? '<span class="overlap">⚠ overlap</span>' : ""}
          </div>
        </div>
      </div>`;
						})
						.join("");
				}

				// Summary
				const totalRed = EVENTS.filter((e) => e.priority === "red").length;
				const totalYellow = EVENTS.filter(
					(e) => e.priority === "yellow",
				).length;
				document.getElementById("summary").innerHTML = `
    <div class="label">Full Convention Summary</div>
    <div class="summary-stats">
      <div><div class="stat-num stat-red">${totalRed}</div><div class="stat-label">Must-go events</div></div>
      <div><div class="stat-num stat-yellow">${totalYellow}</div><div class="stat-label">Maybe events</div></div>
      <div><div class="stat-num stat-total">${EVENTS.length}</div><div class="stat-label">Total tracked</div></div>
    </div>`;
			}

			render();
		</script>
	</body>
</html>
